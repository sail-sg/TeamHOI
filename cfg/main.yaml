# if given, will override the device setting in gym. 
env: 
  numEnvs: 2048
  envSpacing: 5
  episodeLength: 600
  isFlagrun: False
  enableDebugVis: False
  
  pdControl: True
  powerScale: 1.0
  controlFrequencyInv: 2 # 30 Hz
  stateInit: "Default"
  hybridInitProb: 0.5
  numAMPObsSteps: 5
  
  localRootObs: True
  keyBodies: ["right_hand", "left_hand", "right_foot", "left_foot"]
  contactBodies: ["right_foot", "left_foot", "right_hand", "left_hand"]
  contactObjects: ["box"]
  terminationHeight: 0.2
  enableEarlyTermination: True
  liftBodyNames: ["left_hand", "right_hand"]
  enableTaskObs: True

  enable_task_update: False
  tarChangeStepsMin: 50
  tarChangeStepsMax: 200
  LogSuccess: False
  
  asset:
    assetRoot: "teamhoi/data/assets"
    assetFileName: "mjcf/amp_humanoid.xml"

  plane:
    staticFriction: 1.0
    dynamicFriction: 1.0
    restitution: 0.0

sim:
  substeps: 2
  physx:
    num_threads: 4
    solver_type: 1  # 0: pgs, 1: tgs
    num_position_iterations: 4
    num_velocity_iterations: 0
    contact_offset: 0.02
    rest_offset: 0.0
    bounce_threshold_velocity: 0.2
    max_depenetration_velocity: 10.0
    default_buffer_size_multiplier: 10.0

  flex:
    num_inner_iterations: 10
    warm_start: 0.25
